name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.10.0'

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_STRING_CONNECTION: mongodb://localhost:27017
      MONGO_DB_NAME: micro_template_test
      REDIS_SERVER_URI: redis://localhost:6379
      REDIS_DB: 1
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test
      PORT: 5500
      PORT_GRPC: 50052
      APP_NAME: micro-template
      KAFKA_BROKERS: localhost:9092
      KAFKA_CLIENT_ID: micro-template-ci
      KAFKA_GROUP_ID: micro-template-ci-group
      GRPC_URL_USER: localhost:50052

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Build (type-check)
        run: pnpm build

      - name: Unit tests
        run: pnpm test -- --passWithNoTests

      - name: Test coverage
        run: pnpm test:cov -- --passWithNoTests

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: micro-template:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
